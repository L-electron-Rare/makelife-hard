kibot:
  version: 1

outputs:
  - name: gerbers
    type: gerber
    dir: outputs/gerbers
    layers:
      - F.Cu
      - B.Cu
      - F.SilkS
      - B.SilkS
      - F.Mask
      - B.Mask
      - Edge.Cuts

  - name: bom
    type: bom
    dir: outputs
    options:
      format: CSV
      output: bom.csv

  - name: schematic_pdf
    type: pdf_sch_print
    dir: outputs
